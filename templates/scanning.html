<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanning {{ domain }} - SiteShield</title>
    
    {% include 'analytics.html' %}
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2e3192 0%, #1bffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .spinner {
            width: 80px;
            height: 80px;
            border: 6px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .domain {
            color: #64748b;
            font-size: 18px;
            margin-bottom: 40px;
            word-break: break-all;
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #10b981);
            width: 0%;
            transition: width 0.5s ease;
        }
        
        .status {
            font-size: 16px;
            color: #475569;
            margin-bottom: 30px;
            min-height: 24px;
        }
        
        .steps {
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }
        
        .step {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-left: 4px solid #10b981;
            border-radius: 5px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .error {
            color: #ef4444;
            font-weight: bold;
        }
        
        .retry-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .retry-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>🔒 Scanning Your Website</h1>
        <div class="domain">{{ domain }}</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status" id="status">Initializing scan...</div>
        
        <div class="steps" id="steps"></div>
    </div>

       <script>
        const eventSource = new EventSource('/scan-stream/{{ domain }}');
        
        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Update progress
            document.getElementById('progressFill').style.width = data.progress + '%';
            document.getElementById('status').textContent = data.message;
            
            // Handle errors
            if (data.step === 'error') {
                document.getElementById('status').innerHTML = '<span class="error">❌ ' + data.message + '</span>';
                
                const btn = document.createElement('button');
                btn.className = 'retry-btn';
                btn.textContent = 'Try Again';
                btn.onclick = () => window.location.href = '/';
                document.querySelector('.container').appendChild(btn);
                
                eventSource.close();
                return;
            }
            
            // Add completed steps
            if (data.step.endsWith('_done') || data.step === 'complete') {
                const step = document.createElement('div');
                step.className = 'step';
                step.innerHTML = '<span style="color: #10b981;">✓</span> ' + data.message;
                document.getElementById('steps').appendChild(step);
                
                // Auto-scroll
                document.getElementById('steps').scrollTop = document.getElementById('steps').scrollHeight;
            }
            
            // Redirect on complete
            if (data.step === 'complete' && data.redirect) {
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1000);
                eventSource.close();
            }
        };
        
        eventSource.onerror = function() {
            document.getElementById('status').innerHTML = '<span class="error">❌ Connection lost</span>';
            eventSource.close();
            
            const btn = document.createElement('button');
            btn.className = 'retry-btn';
            btn.textContent = 'Try Again';
            btn.onclick = () => window.location.href = '/';
            document.querySelector('.container').appendChild(btn);
        };
    </script>
    
    <!-- Remove the hidden form, we don't need it anymore -->

    
    <!-- Hidden form to submit after animation -->
    <!-- <form method="POST" action="/scan-process" style="display: none;">
        <input type="hidden" name="domain" value="{{ domain }}">
    </form> -->
</body>
</html>
